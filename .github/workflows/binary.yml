name: Build binaries

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Add assimp to PATH
        shell: pwsh
        run: |
          $assimpPath = "$(pwd)\assimp"
          echo "PATH=$assimpPath;$env:PATH" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get latest Assimp release (v6.0.2, Windows x64)
        run: |
          echo "Get prebuilt Assimp 6.0.2 (Windows x64)..."
          curl -L -o assimp.zip https://github.com/assimp/assimp/releases/download/v6.0.2/windows-x64-v6.0.2.zip
          echo "Extracting..."
          powershell -Command "Expand-Archive -Path assimp.zip -DestinationPath assimp-temp"
          mkdir -Force assimp
          copy assimp-temp\Release\assimp-vc143-mt.dll engine\assimp\assimp.dll
          echo "Assimp DLL ready at assimp\assimp.dll"

      - name: Build executable
        run: |
          echo "Running PyInstaller..."
          pyinstaller export.spec --distpath export

      - name: Zip the export folder
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
        run: |
          powershell Compress-Archive -Path export/* -DestinationPath EmberEngine-Demo.zip

      - name: Upload artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: EmberEngine-Demo
          path: EmberEngine-Demo.zip
            
  create-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [deploy-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: EmberEngine-Demo
          path: ./windows-dist

      - name: Create Release
        id: create_release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GH_TOKEN }}
          automatic_release_tag: "latest"
          prerelease: false
          title: "Latest Release"
          files: |
            ./windows-dist/EmberEngine-Demo.zip